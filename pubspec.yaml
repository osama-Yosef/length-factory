name: length_factory
description: "Length Factory - Production-ready factory management & ordering system."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  # firebase_messaging: ^15.1.3  # FCM not supported on Windows Desktop - enable for Android only

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.3
  fl_chart: ^0.69.0
  flutter_staggered_animations: ^1.1.1
  badges: ^3.1.2
  flutter_slidable: ^3.1.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  # flutter_image_compress: ^2.3.0  # Windows support محدود - هيتفعّل للـ Android لاحقًا
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  go_router: ^14.6.1
  equatable: ^2.0.7
  logger: ^2.4.0
  flutter_dotenv: ^5.2.1

  # Export / Print / QR
  pdf: ^3.11.1
  printing: ^5.13.3
  excel: ^4.0.6
  qr_flutter: ^4.1.0
  path_provider: ^2.1.5
  share_plus: ^10.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
